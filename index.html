<!DOCTYPE html>
<html>
<head>
<title>MelloFiles</title>

<style>

body{
margin:0;
font-family:Arial;
background:#141414;
color:white;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
position:sticky;
top:0;
}

.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* HERO */

.hero{
height:450px;
background:linear-gradient(to bottom,transparent,#141414),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
background-size:cover;
display:flex;
flex-direction:column;
justify-content:center;
padding-left:60px;
}

.hero h1{
font-size:50px;
}

.hero button{
background:#e50914;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* ROWS */

.section{
padding:30px;
}

.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}


/* CARD */

.card{
min-width:200px;
background:#222;
border-radius:6px;
overflow:hidden;
transition:transform 0.3s;
}

.card:hover{
transform:scale(1.15);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.card a{
background:#e50914;
padding:6px 12px;
display:inline-block;
margin-top:5px;
color:white;
text-decoration:none;
font-size:13px;
}

/* SEARCH */

.search{
text-align:center;
padding:20px;
}

.search input{
padding:10px;
width:300px;
border:none;
border-radius:5px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#888;
}

</style>
</head>

<body>

<header>

<div class="logo">MelloFiles</div>

<nav>
<a href="#">Home</a>
<a href="#">Sites</a>
<a href="#">About</a>
</nav>

</header>


<section class="hero">

<h1>MelloFiles</h1>

<p>Your hub for movie download websites</p>

<button>Browse Sites</button>

</section>


<div class="search">

<input type="text" id="search" placeholder="Search sites..." onkeyup="searchSites()">

</div>


<section class="section">

<h2>Popular Sites</h2>

<div class="row" id="siteRow">

<div class="card" data-name="nkiri">
<img src="nkiri.png" alt="Nkiri">
<div class="card-content">
<h3>Nkiri</h3>
<a href="https://thenkiri.com/" target="_blank" class="visit-btn">Visit</a>
</div>
</div>

<div class="card" data-name="fzseries">
<img src="fzseries.png" alt="FzSeries"> 
<div class="card-content">
<h3>FzSeries</h3>
<a href="https://tvseries.in/" target="_blank" class="visit-btn">Visit</a>
</div>
</div>

<div class="card" data-name="awafim">
<img src="awafim.png" alt="Awafim"> 
<div class="card-content">
<h3>Awafim</h3>
<a href="https://awafim.media/" target="_blank" class="visit-btn">Visit</a> 
</div>
</div>

<div class="card" data-name="9jarocks">
<img src="9jarocks.png" alt="9jarocks">
<div class="card-content">
<h3>9jarocks</h3>
<a href="https://9jarocks.net/" target="_blank" class="visit-btn">Visit</a>
</div>
  
<div class="card">
<img src="toxicwap.png" alt="ToxicWap">
<h3>ToxicWap</h3>
<a href="http://toxicwaps.com/" target="_blank">
<button>Visit</button>
</a>
</div>

<div class="card">
<img src="newtoxic.png" alt="NewToxic">
<h3>NewToxic</h3>
<a href="https://newtoxic.com/" target="_blank">
<button>Visit</button>
</a>
</div>

<div class="card">
<img src="fzmovies.png" alt="FzMovies">
<h3>FzMovies</h3>
<a href="https://www.fzmovies.live/" target="_blank">
<button>Visit</button>
</a>
</div>

<div class="card">
<img src="moviebox.png" alt="MovieBox">
<h3>MovieBox</h3>
<a href="https://moviebox.ph/" target="_blank">
<button>Visit</button>
</a>
</div>

<div class="card">
<img src="kimoitv.png" alt="KiMoiTv">
<h3>KiMoiTv</h3>
<a href="https://kimoitv.com/" target="_blank">
<button>Visit</button>
</a>
</div>
  
</section>


<footer>

<p>© 2026 MelloFiles</p>

</footer>


<script>

function searchSites(){

let input = document.getElementById("search").value.toLowerCase()

let cards = document.querySelectorAll(".card")

cards.forEach(card => {

let name = card.dataset.name

if(name.includes(input)){
card.style.display="block"
}
else{
card.style.display="none"
}

})

}

</script>
<script src="https://pl28930057.effectivegatecpm.com/06/22/9d/06229de6a02d0267a838b7e16ca1309b.js"></script>
</body>
  </html>
