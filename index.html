<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MelloFiles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #000;
    }

    header h1 {
      color: #e50914;
      font-size: 20px;
    }

    header nav a {
      color: #fff;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      padding: 30px 20px;
    }

    .hero h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #bbb;
      margin-bottom: 15px;
    }

    .hero button {
      background: #e50914;
      border: none;
      padding: 10px 15px;
      color: white;
      cursor: pointer;
    }

    /* SEARCH */
    .search {
      padding: 20px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 4px;
    }

    /* SECTION */
    .section {
      padding: 20px;
    }

    .section h2 {
      margin-bottom: 15px;
    }

    /* GRID (FIXED) */
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    /* CARD */
    .card {
      background: #222;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .card-content h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .visit-btn {
      display: inline-block;
      background: #e50914;
      padding: 5px 10px;
      font-size: 12px;
      color: white;
      text-decoration: none;
      border-radius: 3px;
    }

    /* AD SECTION */
    .ad-box {
      margin: 20px;
      padding: 15px;
      background: #1a1a1a;
      text-align: center;
      border-radius: 6px;
    }

    /* MOBILE */
    @media (max-width: 500px) {
      .card img {
        height: 140px;
      }
    }
  </style>
</head>
